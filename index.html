<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fighter Database</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="light-theme">
    <header>
        <nav>
            <div class="logo" id="lang-title">Список Бойцов</div>
            <div class="controls">
                <select id="lang-select">
                    <option value="uk">UA</option>
                    <option value="en">EN</option>
                </select>
                <button id="theme-toggle">🌙/☀️</button>
                <button id="login-btn">Login</button>
                <button id="admin-add-btn" class="hidden">Добавить бойца</button>
            </div>
        </nav>
    </header>

    <main id="fighters-list">
        </main>

    <div id="login-modal" class="modal hidden">
        <div class="modal-content">
            <h2 id="lang-login-title">Вход для Админа</h2>
            <input type="text" id="login-user" placeholder="Username">
            <input type="password" id="login-pass" placeholder="Password">
            <button id="auth-submit">Войти</button>
            <button class="close-modal">Отмена</button>
        </div>
    </div>

    <div id="fighter-modal" class="modal hidden">
        <div class="modal-content">
            <h2 id="modal-title">Боец</h2>
            <input type="text" id="f-name" placeholder="Имя">
            <input type="number" id="f-year" placeholder="Год рождения">
            <input type="number" id="f-wins" placeholder="Побед">
            <input type="number" id="f-losses" placeholder="Поражений">
            <input type="file" id="f-photo" accept="image/*">
            
            <div class="titles-section">
                <h4>Титулы</h4>
                <input type="text" id="t-text" placeholder="Текст титула">
                <input type="color" id="t-color" value="#ffd700">
                <input type="text" id="t-emoji" placeholder="Emoji (🏆)">
                <button id="add-title-btn">Добавить титул в список</button>
                <div id="temp-titles"></div>
            </div>

            <button id="save-fighter">Сохранить</button>
            <button class="close-modal">Закрыть</button>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
