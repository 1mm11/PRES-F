<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fight Platform</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --text-color: #333;
            --card-bg: #fff;
            --primary: #e63946;
            --secondary: #1d3557;
            --success: #2a9d8f;
            --border-radius: 12px;
            --shadow: 0 8px 16px rgba(0,0,0,0.1);
        }

        [data-theme="dark"] {
            --bg-color: #121212;
            --text-color: #f1f1f1;
            --card-bg: #1e1e1e;
            --primary: #ff4d5a;
            --secondary: #a8b2d1;
            --success: #45c4b6;
            --shadow: 0 8px 16px rgba(0,0,0,0.5);
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            transition: 0.3s;
        }

        header {
            background-color: var(--card-bg);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow);
            flex-wrap: wrap; gap: 10px;
        }

        .controls { display: flex; gap: 10px; align-items: center; }
        
        button {
            padding: 10px 18px; border: none; border-radius: 8px;
            cursor: pointer; background-color: var(--secondary);
            color: white; font-weight: bold; transition: 0.2s;
        }
        button:hover { opacity: 0.8; }
        .btn-primary { background-color: var(--primary); }
        .btn-success { background-color: var(--success); }
        .admin-only { display: none; }

        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .fighters-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px;
        }

        .fighter-card {
            background: var(--card-bg); border-radius: var(--border-radius);
            padding: 20px; box-shadow: var(--shadow); text-align: center;
        }
        .fighter-photo {
            width: 120px; height: 120px; border-radius: 50%; object-fit: cover;
            border: 3px solid var(--primary); margin-bottom: 10px;
        }

        dialog {
            background: var(--card-bg); color: var(--text-color);
            border: none; border-radius: 15px; padding: 25px; width: 90%; max-width: 400px;
        }
        input, select, textarea {
            width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px;
            border: 1px solid #ccc; background: var(--bg-color); color: var(--text-color);
        }
        .user-info { font-weight: bold; color: var(--success); margin-right: 10px; }
    </style>
</head>
<body>

    <header>
        <div class="logo" style="font-size:22px; font-weight:bold;">🥊 FIGHT PRO</div>
        <div class="controls">
            <span id="userInfo" class="user-info"></span>
            <select id="langSelect">
                <option value="uk">UA</option>
                <option value="en">EN</option>
            </select>
            <button onclick="toggleTheme()">🌓</button>
            <button onclick="showSchedule()">📅 Розклад</button>
            <button id="regBtn" onclick="document.getElementById('registerModal').showModal()">📝 Реєстрація</button>
            <button id="loginBtn" onclick="document.getElementById('loginModal').showModal()">🔐 Увійти</button>
            
            <button id="adminAddBtn" class="admin-only btn-primary" onclick="document.getElementById('manualAddModal').showModal()">+ Додати учасника</button>
            <button id="adminReqBtn" class="admin-only btn-success" onclick="showRequests()">Заявки (<span id="reqCount">0</span>)</button>
            <button id="logoutBtn" style="display:none;" onclick="logout()">Вийти</button>
        </div>
    </header>

    <div class="container">
        <h2 id="pageTitle">Список Учасників</h2>
        <div class="fighters-grid" id="fightersGrid"></div>
    </div>

    <dialog id="loginModal">
        <h2>Вхід у систему</h2>
        <p style="font-size: 12px; color: gray;">Адмін вводить свій пароль. Учасники вводять своє Ім'я (після підтвердження).</p>
        <input type="text" id="loginName" placeholder="Ваше Ім'я (або Admin)">
        <input type="password" id="loginPass" placeholder="Пароль (тільки для Admin)">
        <button class="btn-primary" style="width:100%" onclick="handleLogin()">Увійти</button>
        <button style="width:100%; margin-top:5px;" onclick="this.closest('dialog').close()">Закрити</button>
    </dialog>

    <dialog id="registerModal">
        <h2>Подати заявку</h2>
        <select id="regRole">
            <option value="fighter">Боєць</option>
            <option value="judge">Суддя</option>
            <option value="operator">Оператор</option>
        </select>
        <input type="text" id="regName" placeholder="Ім'я та Прізвище">
        <input type="number" id="regYear" placeholder="Рік народження">
        <input type="file" id="regPhoto" accept="image/*">
        <button class="btn-success" style="width:100%" onclick="submitRegistration()">Відправити</button>
        <button style="width:100%; margin-top:5px;" onclick="this.closest('dialog').close()">Скасувати</button>
    </dialog>

    <dialog id="manualAddModal">
        <h2>Додати учасника вручну</h2>
        <select id="manRole">
            <option value="fighter">Боєць</option>
            <option value="judge">Суддя</option>
            <option value="operator">Оператор</option>
        </select>
        <input type="text" id="manName" placeholder="Ім'я">
        <input type="number" id="manYear" placeholder="Рік">
        <input type="file" id="manPhoto" accept="image/*">
        <button class="btn-primary" style="width:100%" onclick="adminManualAdd()">Додати негайно</button>
        <button style="width:100%; margin-top:5px;" onclick="this.closest('dialog').close()">Скасувати</button>
    </dialog>

    <dialog id="requestsModal">
        <h2>Заявки на підтвердження</h2>
        <div id="requestsList"></div>
        <button style="width:100%" onclick="this.closest('dialog').close()">Закрити</button>
    </dialog>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, onValue, push, set, remove, update } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";
        import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDFYWJavux5oegrdxT4CUV5DlXJqM6AiGo",
            authDomain: "boiii-d61d9.firebaseapp.com",
            databaseURL: "https://boiii-d61d9-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "boiii-d61d9",
            storageBucket: "boiii-d61d9.firebasestorage.app",
            messagingSenderId: "671885912489",
            appId: "1:671885912489:web:3b6cfbdefa98d974debcb8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const storage = getStorage(app);

        let currentUser = null;
        let isAdmin = false;
        let fighters = {};

        // --- ЛОГІКА ВХОДУ ---
        window.handleLogin = () => {
            const name = document.getElementById('loginName').value;
            const pass = document.getElementById('loginPass').value;

            // Перевірка на адміна
            if (name === 'Admin' && pass === 'vlad01032014v') {
                isAdmin = true;
                currentUser = { name: 'Адміністратор' };
                loginSuccess();
                return;
            }

            // Перевірка на звичайного користувача
            let foundUser = Object.values(fighters).find(f => f.name === name);
            if (foundUser) {
                isAdmin = false;
                currentUser = foundUser;
                loginSuccess();
            } else {
                alert("Користувача не знайдено або дані невірні!");
            }
        };

        function loginSuccess() {
            document.getElementById('loginModal').close();
            document.getElementById('loginBtn').style.display = 'none';
            document.getElementById('regBtn').style.display = 'none';
            document.getElementById('logoutBtn').style.display = 'block';
            document.getElementById('userInfo').innerText = `Привіт, ${currentUser.name}!`;
            
            if (isAdmin) {
                document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'block');
            }
            renderFighters();
        }

        window.logout = () => {
            location.reload();
        };

        // --- ДОДАВАННЯ УЧАСНИКІВ ---
        // 1. Реєстрація (Заявка)
        window.submitRegistration = async () => {
            const name = document.getElementById('regName').value;
            const file = document.getElementById('regPhoto').files[0];
            if (!name || !file) return alert("Заповни все!");

            const newReqRef = push(ref(db, 'requests'));
            const photoRef = sRef(storage, 'photos/' + newReqRef.key);
            await uploadBytes(photoRef, file);
            const url = await getDownloadURL(photoRef);

            await set(newReqRef, {
                name, 
                role: document.getElementById('regRole').value,
                birthYear: document.getElementById('regYear').value,
                photo: url
            });
            alert("Заявку відправлено адміну!");
            document.getElementById('registerModal').close();
        };

        // 2. Адмін додає вручну
        window.adminManualAdd = async () => {
            const name = document.getElementById('manName').value;
            const file = document.getElementById('manPhoto').files[0];
            if (!name || !file) return alert("Заповни дані!");

            const newRef = push(ref(db, 'fighters'));
            const photoRef = sRef(storage, 'photos/' + newRef.key);
            await uploadBytes(photoRef, file);
            const url = await getDownloadURL(photoRef);

            await set(newRef, {
                name,
                role: document.getElementById('manRole').value,
                birthYear: document.getElementById('manYear').value,
                photo: url,
                wins: 0, losses: 0
            });
            alert("Додано успішно!");
            document.getElementById('manualAddModal').close();
        };

        // --- ВІДОБРАЖЕННЯ ---
        onValue(ref(db, 'fighters'), (snap) => {
            fighters = snap.val() || {};
            renderFighters();
        });

        onValue(ref(db, 'requests'), (snap) => {
            const reqs = snap.val() || {};
            document.getElementById('reqCount').innerText = Object.keys(reqs).length;
        });

        window.renderFighters = () => {
            const grid = document.getElementById('fightersGrid');
            grid.innerHTML = '';
            Object.keys(fighters).forEach(id => {
                const f = fighters[id];
                const stats = f.role === 'fighter' ? `<p>🏆 ${f.wins} | ❌ ${f.losses}</p>` : '';
                const adminControls = isAdmin ? `
                    <button style="background:orange; padding:5px;" onclick="editFighter('${id}')">✏️</button>
                    <button style="background:red; padding:5px;" onclick="deleteFighter('${id}')">🗑️</button>
                ` : '';

                grid.innerHTML += `
                    <div class="fighter-card">
                        <img src="${f.photo}" class="fighter-photo">
                        <div style="font-size:12px; color:gray;">${f.role.toUpperCase()}</div>
                        <h3 style="margin:5px 0;">${f.name}</h3>
                        <p style="font-size:13px;">Рік: ${f.birthYear}</p>
                        ${stats}
                        ${adminControls}
                    </div>
                `;
            });
        };

        // Адмінські функції видалення/редагування
        window.deleteFighter = (id) => {
            if(confirm("Видалити учасника?")) remove(ref(db, `fighters/${id}`));
        };

        window.showRequests = () => {
            const list = document.getElementById('requestsList');
            list.innerHTML = '';
            onValue(ref(db, 'requests'), (snap) => {
                const data = snap.val() || {};
                list.innerHTML = '';
                Object.keys(data).forEach(id => {
                    const r = data[id];
                    list.innerHTML += `
                        <div style="border-bottom:1px solid #ccc; padding:10px;">
                            <b>${r.name}</b> (${r.role}) 
                            <button class="btn-success" onclick="approve('${id}')">✅</button>
                            <button class="btn-primary" onclick="reject('${id}')">❌</button>
                        </div>
                    `;
                });
            }, {onlyOnce: true});
            document.getElementById('requestsModal').showModal();
        };

        window.approve = async (id) => {
            onValue(ref(db, `requests/${id}`), async (snap) => {
                const data = snap.val();
                if(data) {
                    await set(push(ref(db, 'fighters')), {...data, wins:0, losses:0});
                    await remove(ref(db, `requests/${id}`));
                }
            }, {onlyOnce: true});
        };

        window.reject = (id) => remove(ref(db, `requests/${id}`));

        // Тема
        window.toggleTheme = () => {
            const b = document.body;
            b.getAttribute('data-theme') === 'dark' ? b.removeAttribute('data-theme') : b.setAttribute('data-theme', 'dark');
        };

    </script>
</body>
</html>
